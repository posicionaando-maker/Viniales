<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ticket Ventas</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="manifest" href="manifest.json">
</head>
<body class="bg-gray-100 h-screen flex flex-col">

    <header class="bg-green-700 text-white p-4 shadow-lg flex justify-between items-center">
        <h1 class="text-xl font-bold">🛒 Agromercado Viñales</h1>
        <div id="status-online" class="w-3 h-3 bg-green-400 rounded-full border border-white"></div>
    </header>

    <main class="flex-1 overflow-y-auto p-4">
        <div id="grid-productos" class="grid grid-cols-2 sm:grid-cols-3 gap-4">
            </div>
    </main>

    <footer class="bg-white border-t-4 border-green-600 p-4 shadow-2xl">
        <div class="flex justify-between items-center mb-4">
            <span class="text-gray-600">Items: <b id="cuenta-items">0</b></span>
            <span class="text-2xl font-black text-green-800">Total: $<span id="total-venta">0.00</span></span>
        </div>
        
        <div class="flex gap-2">
            <button onclick="cancelarVenta()" class="flex-1 bg-gray-200 text-gray-700 font-bold py-4 rounded-xl">Vaciar</button>
            <button onclick="procesarVenta()" class="flex-[2] bg-green-600 text-white font-black py-4 rounded-xl shadow-lg active:scale-95 transition-transform text-xl">
                COBRAR (F1)
            </button>
        </div>
    </footer>

    <script src="script.js"></script>
</body>
</html>
