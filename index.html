<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Viandas POS - Vendedor</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="manifest" href="manifest-vendedor.json">
    <meta name="theme-color" content="#15803d">
</head>
<body class="bg-gray-100 flex flex-col overflow-hidden" style="height: 100dvh;">

    <header class="bg-green-700 text-white p-3 shadow-md flex justify-between items-center shrink-0">
        <h1 class="text-lg font-bold flex items-center gap-2">
            <span>🛒</span> Agromercado Viñales
        </h1>
        <div id="online-indicator" class="flex items-center gap-1 text-xs bg-green-800 px-2 py-1 rounded-full">
            <div class="w-2 h-2 bg-green-400 rounded-full animate-pulse"></div>
            ONLINE
        </div>
    </header>

    <main class="flex-1 overflow-y-auto p-3">
        <div id="grid-productos" class="grid grid-cols-2 sm:grid-cols-3 gap-3">
            <div class="col-span-full text-center py-10 text-gray-400">
                Cargando inventario...
            </div>
        </div>
    </main>

    <footer class="bg-white border-t-2 border-green-600 p-4 shadow-[0_-5px_15px_rgba(0,0,0,0.1)] shrink-0">
        <div class="flex justify-between items-end mb-3">
            <div class="leading-none">
                <span class="text-gray-400 text-[10px] uppercase font-bold block">Artículos</span>
                <span id="cuenta-items" class="text-xl font-bold text-gray-700">0</span>
            </div>
            <div class="text-right leading-none">
                <span class="text-gray-400 text-[10px] uppercase font-bold block">Total a Pagar</span>
                <span class="text-3xl font-black text-green-700">$<span id="total-venta">0.00</span></span>
            </div>
        </div>
        
        <div class="flex gap-2">
            <button onclick="cancelarVenta()" 
                    class="flex-1 bg-gray-200 text-gray-600 font-bold py-4 rounded-xl text-sm active:bg-gray-300 transition-colors">
                VACIAR
            </button>
            
            <button onclick="procesarVenta()" 
                    class="flex-[2] bg-green-600 text-white font-black py-4 rounded-xl shadow-lg active:scale-95 transition-transform text-xl uppercase">
                A COBRAR
            </button>
        </div>
    </footer>

    <script src="script.js"></script>
    
    <script>
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('./sw.js')
                    .then(reg => console.log('PWA Lista'))
                    .catch(err => console.log('Error de SW', err));
            });
        }
    </script>
    <footer class="bg-white border-t-2 border-green-600 p-4 pb-8 shadow-[0_-5px_15px_rgba(0,0,0,0.1)] shrink-0">
    ...
</footer>
</body>
</html>
