<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Panel de Administración - Mercado</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-50 font-sans">

    <header class="bg-slate-800 text-white p-6 shadow-xl">
        <div class="container mx-auto flex justify-between items-center">
            <h1 class="text-2xl font-bold">🛠️ Panel de Control Admin</h1>
            <button onclick="sincronizarTodo()" class="bg-blue-600 hover:bg-blue-700 px-4 py-2 rounded-lg text-sm transition">
                Refrescar Datos
            </button>
        </div>
    </header>

    <main class="container mx-auto p-4 lg:p-8">
        
        <div class="grid grid-cols-1 md:grid-cols-3 gap-6 mb-8">
            <div class="bg-white p-6 rounded-2xl shadow-sm border-l-4 border-green-500">
                <p class="text-gray-500 text-sm uppercase font-bold">Ventas del Día</p>
                <p id="kpi-ventas" class="text-3xl font-black text-slate-800">$0.00</p>
            </div>
            <div class="bg-white p-6 rounded-2xl shadow-sm border-l-4 border-orange-500">
                <p class="text-gray-500 text-sm uppercase font-bold">Productos Críticos</p>
                <p id="kpi-criticos" class="text-3xl font-black text-slate-800">0</p>
            </div>
            <div class="bg-white p-6 rounded-2xl shadow-sm border-l-4 border-blue-500">
                <p class="text-gray-500 text-sm uppercase font-bold">Existencia Total</p>
                <p id="kpi-stock" class="text-3xl font-black text-slate-800">0 lbs</p>
            </div>
        </div>

        <section class="bg-white p-6 rounded-2xl shadow-sm border border-slate-200 mb-8">
            <h2 class="text-xl font-bold mb-4 text-slate-700">📥 Entrada de Mercancía Nueva</h2>
            <div class="grid grid-cols-1 md:grid-cols-4 gap-4">
                <select id="input-prod" class="border p-3 rounded-xl bg-slate-50">
                    </select>
                <input type="number" id="input-cant" placeholder="Cantidad (lb)" class="border p-3 rounded-xl">
                <input type="number" id="input-precio" placeholder="Nuevo Precio Venta" class="border p-3 rounded-xl">
                <button onclick="guardarEntrada()" class="bg-slate-800 text-white font-bold py-3 rounded-xl hover:bg-black transition">
                    Registrar Entrada
                </button>
            </div>
        </section>

        <section class="bg-white rounded-2xl shadow-sm border border-slate-200 overflow-hidden">
            <table class="w-full text-left">
                <thead class="bg-slate-50 border-b">
                    <tr>
                        <th class="p-4 font-bold text-slate-600">Producto</th>
                        <th class="p-4 font-bold text-slate-600">Stock Actual</th>
                        <th class="p-4 font-bold text-slate-600">Precio</th>
                        <th class="p-4 font-bold text-slate-600">Estado</th>
                    </tr>
                </thead>
                <tbody id="tabla-cuerpo">
                    </tbody>
            </table>
        </section>
    </main>

    <script src="admin.js"></script>
</body>
</html>
